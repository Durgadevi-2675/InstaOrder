<div class="signup-container">
  <div class="signup-card">
    <h2>Create Your Account</h2>
    <p>Please fill in the details to sign up</p>

    <form [formGroup]="signupForm" (ngSubmit)="onSignup()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input id="firstName" formControlName="firstName" type="text" class="form-control" />
          <small *ngFor="let err of getFormErrors(signupForm, 'firstName')" class="error">{{ err }}</small>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input id="lastName" formControlName="lastName" type="text" class="form-control" />
          <small *ngFor="let err of getFormErrors(signupForm, 'lastName')" class="error">{{ err }}</small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="email" class="form-control" />
        <small *ngFor="let err of getFormErrors(signupForm, 'email')" class="error">{{ err }}</small>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" formControlName="phone" type="tel" class="form-control" />
        <small *ngFor="let err of getFormErrors(signupForm, 'phone')" class="error">{{ err }}</small>
      </div>

      <div class="form-group" *ngIf="userType === 'seller'">
        <label for="address">Shop Address</label>
        <textarea id="address" formControlName="address" rows="3" class="form-control"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" formControlName="password" type="password" class="form-control" />
          <small *ngFor="let err of getFormErrors(signupForm, 'password')" class="error">{{ err }}</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" formControlName="confirmPassword" type="password" class="form-control" />
          <small *ngIf="signupForm.errors?.['passwordMismatch'] && signupForm.get('confirmPassword')?.touched" class="error">
            Passwords do not match
          </small>
        </div>
      </div>

      <button type="submit" [disabled]="signupForm.invalid || isLoading" class="btn-submit">
        <span *ngIf="isLoading" class="spinner"></span>
        {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
      </button>

      <div *ngIf="errorMessage" class="form-error">{{ errorMessage }}</div>
    </form>

    <!-- Add after the Sign Up button -->
    <div class="divider">
      <span>or</span>
    </div>

    <button type="button" (click)="onGoogleSignIn()" [disabled]="isLoading" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      {{ isLoading ? 'Signing up...' : 'Sign up with Google' }}
    </button>
  </div>
</div>
